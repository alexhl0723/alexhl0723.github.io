<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagos/Bookstore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../styles/carrito.css">
</head>

<body>
    <header>
        <div class="container-top-barra">
            <div class="logo">
                <a href="../index.html"><img src="../img/logo-reak .png" alt="" width="120"></a>
            </div>
            <div class="container-barra-media">
                <ul>
                    <li><a href="./nosotros.html">Nosotros</a></li>
                    <li><a href="#">Contribuciones</a></li>
                    <li><a href="https://www.linkedin.com/in/alexherbasleiva" target="_blank"><i
                                class="fa-brands fa-linkedin"></i></a></li>
                    <li><a href="https://x.com/alexhl2303" target="_blank"><i class="fa-brands fa-twitter"></i></a>
                    </li>
                    <li><a href="https://www.instagram.com/alex._.hl_/" target="_blank"><i
                                class="fa-brands fa-instagram"></i></a></li>
                    <li><a href="https://github.com/alexhl0723/alexhl0723.github.io" target="_blank"><i
                                class="fa-brands fa-github"></i></a></li>
                </ul>
            </div>
            <div class="container-barra-rigth">
                <button id="colorToggleBtn">Cambiar Color</button>
                <a href="#" id="logout_btn"><i class="fa-solid fa-right-from-bracket"></i></a>
                <a href="./user.html"><i class="fa-regular fa-user"></i></a>
                <a href="./carrito.html"><i class="fa-solid fa-cart-shopping"></i></a>
                <a href="#"><i class="fa-regular fa-heart"></i></a>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="cart-items">
                <h1>Tu Carrito de Compras</h1>
                <div class="item">
                    <img src="../img/1984.jpg" alt="Portada del libro" class="item-image">
                    <div class="item-details">
                        <h3>1984</h3>
                        <p>20.99</p>
                        <p>George Orwell</p>
                    </div>
                    <div class="quantity-control">
                        <button class="quantity-btn">-</button>
                        <span class="quantity-display">1</span>
                        <button class="quantity-btn">+</button>
                    </div>
                </div>
            </div>

            <div class="order-summary">
                <h2>Resumen del Pedido</h2>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span>$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Envío</span>
                    <span>Gratis</span>
                </div>
                <div class="summary-row">
                    <span>Total</span>
                    <span>$0.00</span>
                </div>


                <a href="./info-pago.html"><button class="checkout-btn">Continuar</button></a>
                <a href="../index.html"><button class="continue-btn">Continuar Comprando</button></a>
            </div>
        </div>


    </main>
    <script src="../js/carrito.js"></script>
    <script src="../js/verif.js"></script>
    <script src=""></script>
</body>

</html>
